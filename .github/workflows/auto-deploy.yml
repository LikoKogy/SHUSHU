name: Auto Deploy Claude Changes

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to main and deploy
        run: |
          git config user.email "auto-deploy@shushu.app"
          git config user.name "Auto Deploy"
          git checkout main
          git merge origin/${{ github.ref_name }} --no-edit
          git push origin main
